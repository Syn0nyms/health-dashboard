<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Dashboard V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{background:#0f1117;color:#e0e0e0;font-family:Segoe UI,sans-serif;margin:0;padding:20px;max-width:1100px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.card{background:#1a1a1b;border:1px solid #343536;border-radius:10px;padding:15px}
.big{font-size:28px;font-weight:700}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:15px 0}
.tabbtn{background:#1a1a1b;border:1px solid #343536;color:white;padding:10px 14px;border-radius:8px;cursor:pointer}
.tab{display:none}.active{display:block}
canvas{max-height:350px}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;background:#223;color:#8fd}
</style>
</head>
<body>
<h1>Health Journey Dashboard V2</h1>
<div class="tabs">
<button class="tabbtn" onclick="showTab('overview')">Overview</button>
<button class="tabbtn" onclick="showTab('journey')">Journey</button>
<button class="tabbtn" onclick="showTab('recovery')">Recovery</button>
<button class="tabbtn" onclick="showTab('achievements')">Achievements</button>
<button class="tabbtn" onclick="showTab('wrapped')">Wrapped</button>
</div>

<div id="overview" class="tab active">
<div class="grid" id="kpis"></div>
<div class="card"><canvas id="weightChart"></canvas></div>
</div>

<div id="journey" class="tab">
<div class="card" id="journeyCard"></div>
<div class="card" id="distanceCard"></div>
</div>

<div id="recovery" class="tab">
<div class="card" id="recoveryCard"></div>
</div>

<div id="achievements" class="tab">
<div class="card" id="achievementCard"></div>
</div>

<div id="wrapped" class="tab">
<div class="card" id="wrappedCard"></div>
</div>

<script>
function showTab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');}

function num(v){if(!v)return null; v=String(v).replace(/,/g,'').trim(); return isNaN(parseFloat(v))?null:parseFloat(v);}
function sleepH(v){if(!v) return null; let p=v.split(':'); if(p.length<2) return null; return (+p[0])+(+p[1]/60);}

Papa.parse('Health_Tracker.csv',{
download:true,
complete:(r)=>{
const rows=r.data.slice(6).filter(x=>x[1]);
const dates=rows.map(r=>r[1]);
const weight=rows.map(r=>num(r[4])).filter(Boolean);
const w7=rows.map(r=>num(r[5]));
const hrv=rows.map(r=>num(r[8])).filter(Boolean);
const rhr=rows.map(r=>num(r[9])).filter(Boolean);
const kms=rows.map(r=>num(r[11])).filter(Boolean);
const sleep=rows.map(r=>sleepH(r[7])).filter(x=>x!=null);

const start=weight[0];
const current=weight[weight.length-1];
const lost=(start-current).toFixed(1);
const totalKm=kms.reduce((a,b)=>a+b,0);
const goal=75;
const progress=((start-current)/(start-goal)*100);
const avgSleep=sleep.reduce((a,b)=>a+b,0)/sleep.length;
const bestHRV=Math.max(...hrv);
const bestRHR=Math.min(...rhr);

let streak=0;
for(let i=rows.length-1;i>=0;i--){if(rows[i][2]=='Y') streak++; else break;}

const cards=[
['Weight Lost',lost+' kg'],
['Distance',totalKm.toFixed(0)+' km'],
['10km Streak',streak+' days'],
['Avg Sleep',avgSleep.toFixed(1)+' h'],
['Best HRV',bestHRV],
['Best RHR',bestRHR]
];

document.getElementById('kpis').innerHTML=cards.map(c=>`<div class="card"><div>${c[0]}</div><div class="big">${c[1]}</div></div>`).join('');

new Chart(document.getElementById('weightChart'),{
type:'line',
data:{labels:dates,datasets:[
{label:'Weight',data:weight,borderColor:'#ff6b35'},
{label:'7DRA',data:w7,borderColor:'#4fbdff'}
]}
});

const dailyRate=(start-current)/weight.length;
const d80=Math.round((current-80)/dailyRate);
const d75=Math.round((current-75)/dailyRate);

document.getElementById('journeyCard').innerHTML=`
<h2>Journey Progress</h2>
<div class="big">${progress.toFixed(0)}%</div>
<p>${start}kg → ${current}kg</p>
<p>80kg ETA: ~${d80>0?d80:'0'} days</p>
<p>75kg ETA: ~${d75>0?d75:'0'} days</p>`;

document.getElementById('distanceCard').innerHTML=`
<h2>Distance Explorer</h2>
<p><b>${totalKm.toFixed(0)} km walked</b></p>
<p>🏃 ${(totalKm/42.195).toFixed(1)} marathons</p>
<p>🌍 ${(totalKm/40075*100).toFixed(2)}% around Earth</p>
<p>🚗 ${(totalKm/275*100).toFixed(0)}% Hyderabad → Vijayawada</p>`;

const recovery=Math.round((bestHRV*0.6)+(100-bestRHR)*0.4);
document.getElementById('recoveryCard').innerHTML=`
<h2>Recovery Intelligence</h2>
<div class="big">${recovery}/100</div>
<p>Best HRV: ${bestHRV}</p>
<p>Best RHR: ${bestRHR}</p>
<p>Average Sleep: ${avgSleep.toFixed(1)}h</p>`;

let badges=[];
if(totalKm>100) badges.push('🏅 Century Walker');
if(totalKm>200) badges.push('🏅 Double Century Walker');
if(current<86) badges.push('🏅 Sub-86 Club');
if(current<85) badges.push('🏅 Sub-85 Club');
document.getElementById('achievementCard').innerHTML='<h2>Achievements</h2>'+badges.map(x=>`<div class="badge">${x}</div>`).join(' ');

document.getElementById('wrappedCard').innerHTML=`
<h2>Current Wrapped</h2>
<p>Weight Lost: ${lost} kg</p>
<p>Distance: ${totalKm.toFixed(0)} km</p>
<p>Best HRV: ${bestHRV}</p>
<p>Best RHR: ${bestRHR}</p>
<p>Current 10km Streak: ${streak} days</p>`;
}
});
</script>
</body></html>
