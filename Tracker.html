<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="./favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Dashboard — June 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card: #1a1a1b;
    --card-alt: #242526;
    --border: #343536;
    --border-soft: #2d2d2e;
    --text: #e0e0e0;
    --text-head: #d7dadc;
    --text-mute: #818384;
    --text-faint: #545454;
    --text-vfaint: #444;
    --badge-bg: #1a3a2a;
    --milestone-bg: #1a2a1a;
    --milestone-border: #2a4a2a;
    --milestone-sub: #6a8a6a;
    --gn: #46d160; --rd: #ff585b; --or: #ff4500; --bl: #4fbdff; --am: #f5a623;
    --weight-line: #ff4500; --avg-line: #ff9966; --steps-line: #4fbdff;
    --rhr-line: #ff585b; --hrv-line: #46d160; --sleep-line: #f5a623;
    --grid: #2d2d2e; --tick: #545454;
  }

  html.light {
    --bg: #f4f4f5;
    --card: #ffffff;
    --card-alt: #f0f0f1;
    --border: #e0e0e1;
    --border-soft: #ebebec;
    --text: #2c2c2e;
    --text-head: #1c1c1e;
    --text-mute: #6b6b6e;
    --text-faint: #8a8a8d;
    --text-vfaint: #9a9a9d;
    --badge-bg: #e3f7e9;
    --milestone-bg: #eaf7ec;
    --milestone-border: #c7ead0;
    --milestone-sub: #4d8a5a;
    --gn: #1f9e4a; --rd: #e0383d; --or: #d8480a; --bl: #1d7fcf; --am: #c97c0a;
    --weight-line: #d8480a; --avg-line: #e8935a; --steps-line: #1d7fcf;
    --rhr-line: #e0383d; --hrv-line: #1f9e4a; --sleep-line: #c97c0a;
    --grid: #e6e6e7; --tick: #8a8a8d;
  }

  body { background: var(--bg); font-family: -apple-system, 'Segoe UI', sans-serif; color: var(--text); padding: 24px 16px; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  .container { max-width: 740px; margin: 0 auto; }

  .header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .header .week { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-faint); margin-bottom: 6px; }
  .header h1 { font-size: 22px; font-weight: 600; color: var(--text-head); line-height: 1.3; margin-bottom: 4px; }
  .header .sub { font-size: 12px; color: var(--text-faint); }

  .theme-toggle { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text-mute); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 16px; }
  .theme-toggle:hover { color: var(--text-head); }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; text-align: center; }
  .kpi .n { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .kpi .l { font-size: 10px; color: var(--text-mute); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .d { font-size: 10px; margin-top: 4px; font-weight: 500; }

  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .chart-card .ct { font-size: 11px; font-weight: 600; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
  .chart-card .cs { font-size: 11px; color: var(--text-vfaint); margin-bottom: 14px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mute); }
  .ls { width: 22px; height: 3px; border-radius: 2px; display: inline-block; }

  .four-col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .insight { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .insight .it { font-size: 11px; font-weight: 600; color: var(--text-head); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .insight .in { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .insight .ib { font-size: 11px; color: var(--text-mute); line-height: 1.6; }

  .annotation { font-size: 11px; color: var(--text-faint); font-style: italic; margin-top: 8px; border-top: 1px solid var(--border-soft); padding-top: 8px; line-height: 1.6; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .badge-g { background: var(--badge-bg); color: var(--gn); }
  .milestone { background: var(--milestone-bg); border: 1px solid var(--milestone-border); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .milestone .mi { font-size: 28px; }
  .milestone .mt { font-size: 13px; font-weight: 600; color: var(--gn); }
  .milestone .ms { font-size: 11px; color: var(--milestone-sub); margin-top: 2px; }

  .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .footer .fl { font-size: 11px; color: var(--text-faint); }
  .footer .fr { font-size: 11px; color: var(--text-faint); text-align: right; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-faint); font-size: 14px; }

  .gn { color: var(--gn); } .rd { color: var(--rd); } .or { color: var(--or); } .bl { color: var(--bl); } .am { color: var(--am); }

  .progress-track { height: 14px; background: var(--card-alt); border-radius: 8px; overflow: hidden; position: relative; margin: 10px 0 6px; }
  .progress-fill { height: 100%; background: var(--gn); border-radius: 8px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-faint); }

  .streak-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
  .streak-box { background: var(--card-alt); border-radius: 6px; padding: 12px; text-align: center; }
  .streak-n { font-size: 22px; font-weight: 700; }
  .streak-l { font-size: 10px; color: var(--text-mute); margin-top: 2px; }

  .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ach { border-radius: 6px; padding: 14px 10px; text-align: center; }
  .ach-icon { font-size: 22px; margin-bottom: 6px; display: block; }
  .ach-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .ach-desc { font-size: 10px; line-height: 1.4; }
  .ach.unlocked { background: var(--badge-bg); }
  .ach.unlocked .ach-icon, .ach.unlocked .ach-title { color: var(--gn); }
  .ach.unlocked .ach-desc { color: var(--milestone-sub); }
  .ach.locked { background: var(--card-alt); opacity: 0.5; }
  .ach.locked .ach-icon, .ach.locked .ach-title { color: var(--text-mute); }
  .ach.locked .ach-desc { color: var(--text-faint); }

  .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .prog-label { font-size: 11px; color: var(--text-mute); width: 90px; flex-shrink: 0; }
  .prog-track { flex: 1; height: 8px; background: var(--card-alt); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; background: var(--bl); }
  .prog-val { font-size: 11px; color: var(--text-faint); width: 60px; text-align: right; flex-shrink: 0; }

  @media (max-width: 520px) {
    .kpi-grid, .four-col, .ach-grid { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 17px; }
  }

  .heart-trigger { cursor: pointer; user-select: none; display: inline-block; font-size: 16px; color: var(--text-faint); opacity: 0.5; transition: opacity 0.15s; }
  .heart-trigger:hover { opacity: 0.9; }

  .retro-wrap { background: #1a1a2e; padding: 16px; font-family: 'Courier New', monospace; border: 4px solid #0f0f1e; border-radius: 8px; }
  .retro-scanline { background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px); }
  .retro-px { font-family: 'Courier New', monospace; letter-spacing: 1px; }
  .retro-hud { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .retro-hud-box { background: #0f0f1e; border: 3px solid #4ecdc4; padding: 6px 10px; flex: 1; min-width: 90px; }
  .retro-hud-label { font-size: 8px; color: #4ecdc4; text-transform: uppercase; }
  .retro-hud-val { font-size: 13px; color: #fff; font-weight: bold; margin-top: 2px; }
  .retro-hp-wrap { background: #0f0f1e; border: 3px solid #ff6b6b; padding: 10px; margin-bottom: 10px; }
  .retro-hp-label { font-size: 9px; color: #ff6b6b; margin-bottom: 6px; }
  .retro-hp-track { height: 16px; background: #2a1a1a; border: 2px solid #4a2a2a; display: flex; }
  .retro-hp-seg { flex: 1; margin: 1px; }
  .retro-panel { background: #0f0f1e; border: 3px solid #ffd93d; padding: 10px; margin-bottom: 10px; }
  .retro-panel-title { font-size: 9px; color: #ffd93d; margin-bottom: 8px; }
  .retro-sprite-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .retro-sprite { background: #1a1a2e; border: 2px solid #444; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .retro-sprite.locked { opacity: 0.3; filter: grayscale(1); }
  .retro-sprite.unlocked { border-color: #4ecdc4; box-shadow: inset 0 0 0 1px #4ecdc4; }
  .retro-level-wrap { background: #0f0f1e; border: 3px solid #6bcf7f; padding: 10px; margin-bottom: 10px; }
  .retro-level-label { font-size: 9px; color: #6bcf7f; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .retro-level-track { height: 14px; background: #1a2a1a; border: 2px solid #2a4a2a; }
  .retro-level-fill { height: 100%; background: repeating-linear-gradient(90deg, #6bcf7f 0px, #6bcf7f 6px, #5bbf6f 6px, #5bbf6f 8px); }
  .retro-chart { background: #0f0f1e; border: 3px solid #a78bfa; padding: 10px; margin-bottom: 10px; }
  .retro-chart-title { font-size: 9px; color: #a78bfa; margin-bottom: 8px; }
  .retro-blink { animation: retroblink 1.2s steps(1) infinite; }
  @keyframes retroblink { 50% { opacity: 0.3; } }
  .retro-exit { background: #0f0f1e; border: 3px solid #fff; color: #fff; font-family: 'Courier New', monospace; font-size: 10px; padding: 8px 14px; cursor: pointer; width: 100%; letter-spacing: 1px; }
  .retro-exit:hover { background: #fff; color: #0f0f1e; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">Loading dashboard from CSV...</div>
</div>

<script>
// ── Theme handling ──
(function() {
  const saved = localStorage.getItem('dashboard-theme');
  if (saved === 'light') document.documentElement.classList.add('light');
})();

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  const isLight = document.documentElement.classList.contains('light');
  localStorage.setItem('dashboard-theme', isLight ? 'light' : 'dark');
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = isLight ? '☀' : '☾';
  if (window.lastRows) buildDashboard(window.lastRows);
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ── Easter egg: retro mode ──
let heartClicks = 0;
let heartClickTimer = null;
let retroMode = false;

function handleHeartClick() {
  heartClicks++;
  clearTimeout(heartClickTimer);
  heartClickTimer = setTimeout(() => { heartClicks = 0; }, 1500);
  if (heartClicks >= 3) {
    heartClicks = 0;
    enterRetroMode();
  }
}

function enterRetroMode() {
  retroMode = true;
  if (window.lastRows) buildDashboard(window.lastRows);
}

function exitRetroMode() {
  retroMode = false;
  if (window.lastRows) buildDashboard(window.lastRows);
}

// ── Column indices (0-based) from the CSV data rows ──
// Col 0: blank, Col 1: Date, Col 2: 10km, Col 3: No Sugar,
// Col 4: Weight, Col 5: Weight(7DRA), Col 6: Change%,
// Col 7: Sleep(Hrs), Col 8: HRV, Col 9: RHR,
// Col 10: Steps, Col 11: Kms, Col 12: Steps/Km,
// Col 13: Kcal, Col 14: Kcal/km, Col 15: WeightChangeYTD, Col 16: CumulativeKMs

const CSV_FILE = 'Health_Tracker.csv';
const HEADER_ROWS = 6; // rows to skip before data starts (0-indexed: rows 0-6)

function parseNum(v) {
  if (!v || v === '' || v.includes('#') || v.trim() === '-' || v.trim() === 'O') return null;
  return parseFloat(v.replace(/,/g, '').trim());
}

function parseSleep(v) {
  // Format: HH:MM:SS
  if (!v || v.trim() === '') return null;
  const parts = v.trim().split(':');
  if (parts.length < 2) return null;
  const h = parseInt(parts[0]);
  const m = parseInt(parts[1]);
  return h + m / 60;
}

function parseDate(v) {
  if (!v || v.trim() === '') return null;
  // Format: DD-MM-YYYY
  const parts = v.trim().split('-');
  if (parts.length !== 3) return null;
  return `${parts[0]}/${parts[1]}`;  // display as DD/MM
}

function toHM(decHours) {
  if (decHours == null) return '—';
  const h = Math.floor(decHours);
  const m = Math.round((decHours - h) * 60);
  return `${h}h ${m.toString().padStart(2,'0')}m`;
}


function buildDashboard(rows) {
  window.lastRows = rows;
  const grid = cssVar('--grid');
  const tick = cssVar('--tick');
  // Filter to rows with a valid date AND a valid weight
  const data = rows.filter(r => {
    const date = r[1] && r[1].trim();
    const weight = parseNum(r[4]);
    return date && date.match(/\d{2}-\d{2}-\d{4}/) && weight !== null;
  });

  if (data.length === 0) {
    document.getElementById('app').innerHTML = '<div class="loading">No valid data found in CSV.</div>';
    return;
  }

  // Extract arrays
  const days    = data.map(r => parseDate(r[1]));
  const weight  = data.map(r => parseNum(r[4]));
  const w7dra   = data.map(r => parseNum(r[5]));
  const sleepRaw= data.map(r => parseSleep(r[7]));
  const hrv     = data.map(r => parseNum(r[8]));
  const rhr     = data.map(r => parseNum(r[9]));
  const steps   = data.map(r => parseNum(r[10]));
  const kms     = data.map(r => parseNum(r[11]));
  const kcal    = data.map(r => parseNum(r[13]));
  const noSugar = data.map(r => r[3] ? r[3].trim() : '');

  // Sleep shifted by 1 (previous night affects today's metrics)
  const sleep = sleepRaw;

  // KPIs
  const firstWeight   = weight[0];
  const lastWeight    = weight[weight.length - 1];
  const weightLost    = +(firstWeight - lastWeight).toFixed(2);
  const totalKms      = kms.filter(v => v !== null).reduce((a, b) => a + b, 0).toFixed(1);
  const firstRHR      = rhr.find(v => v !== null);
  const lastRHR       = [...rhr].reverse().find(v => v !== null);
  const sleepVals     = sleepRaw.filter(v => v !== null);
  const avgSleep      = sleepVals.length ? sleepVals.reduce((a, b) => a + b, 0) / sleepVals.length : null;
  const bestSteps     = Math.max(...steps.filter(v => v !== null));
  const bestHRV       = Math.max(...hrv.filter(v => v !== null));
  const bestRHR       = Math.min(...rhr.filter(v => v !== null));
  const sleep7Days    = sleepRaw.filter(v => v !== null && v >= 7).length;
  const totalDays     = data.length;
  const startDate     = data[0][1].trim();
  const endDate       = data[data.length - 1][1].trim();

  // Compliance scores for chart: 2=green,1=amber,0=red
  const comp800   = kcal.map(v => v === null ? 0 : v >= 800 ? 2 : v >= 400 ? 1 : 0);
  const comp10km  = kms.map(v => v === null ? 0 : v >= 10 ? 2 : v >= 5 ? 1 : 0);
  const compSugar = noSugar.map(v => v === 'Y' ? 2 : v === 'M' ? 1 : v === 'N' ? 0 : 0);
  const compSleep = sleepRaw.map(v => v === null ? 0 : v >= 7 ? 2 : v >= 6 ? 1 : 0);

  const colorMap = { 0: cssVar('--rd'), 1: cssVar('--am'), 2: cssVar('--gn') };

  // ── Goal progress ──
  const GOAL_WEIGHT = 76.0;
  const goalProgress = Math.min(100, Math.max(0, Math.round((firstWeight - lastWeight) / (firstWeight - GOAL_WEIGHT) * 100)));

  // ── Streak calculations (consecutive days ending at most recent logged day, counting from the end) ──
  function currentStreak(arr, isHit) {
    let streak = 0;
    for (let i = arr.length - 1; i >= 0; i--) {
      if (arr[i] === null || arr[i] === undefined) continue;
      if (isHit(arr[i])) { streak++; } else { break; }
    }
    return streak;
  }
  const streakKcal  = currentStreak(kcal, v => v >= 800);
  const streakKm    = currentStreak(kms, v => v >= 10);
  const streakSleep = currentStreak(sleepRaw, v => v >= 7);

  // ── Achievements ──
  const totalKmNum = parseFloat(totalKms);
  const achievements = [
    { icon: 'ti-flag-3', title: 'First 2.5kg', desc: 'Quarter way to goal', unlocked: weightLost >= 2.5 },
    { icon: 'ti-walk', title: '100km club', desc: 'Total distance walked', unlocked: totalKmNum >= 100 },
    { icon: 'ti-walk', title: '200km club', desc: 'Total distance walked', unlocked: totalKmNum >= 200 },
    { icon: 'ti-heart', title: 'Sub-65 RHR', desc: 'Resting HR below 65', unlocked: bestRHR < 65 },
    { icon: 'ti-shoe', title: '15k steps', desc: 'Single day record', unlocked: bestSteps >= 15000 },
    { icon: 'ti-calendar-check', title: '2 week streak', desc: '14 days, no missed kcal', unlocked: streakKcal >= 14 || totalDays >= 14 },
    { icon: 'ti-sun', title: 'First 8h sleep', desc: 'Broke the sleep ceiling', unlocked: sleepVals.some(v => v >= 8) },
    { icon: 'ti-moon', title: 'Sleep streak', desc: '5 nights of 7h+', unlocked: streakSleep >= 5 },
    { icon: 'ti-trophy', title: 'Sub-80kg', desc: 'Next weight milestone', unlocked: lastWeight < 80 },
    { icon: 'ti-route', title: '300km club', desc: 'Total distance walked', unlocked: totalKmNum >= 300 }
  ];
  const unlockedCount = achievements.filter(a => a.unlocked).length;
  const lockedAchievements = achievements.filter(a => !a.unlocked);

  // Progress toward next 3 locked achievements (rough heuristics for progress %)
  function achProgress(a) {
    if (a.title === 'Sleep streak') return { val: `${streakSleep}/5`, pct: Math.min(100, streakSleep/5*100) };
    if (a.title === 'First 2.5kg') return { val: `${weightLost.toFixed(1)}/2.5`, pct: Math.min(100, weightLost/2.5*100) };
    if (a.title === 'Sub-80kg') return { val: `${lastWeight.toFixed(1)}/80`, pct: Math.min(100, Math.max(0,(firstWeight-lastWeight)/(firstWeight-80)*100)) };
    if (a.title === '300km club') return { val: `${totalKmNum.toFixed(0)}/300`, pct: Math.min(100, totalKmNum/300*100) };
    if (a.title === '200km club') return { val: `${totalKmNum.toFixed(0)}/200`, pct: Math.min(100, totalKmNum/200*100) };
    if (a.title === '100km club') return { val: `${totalKmNum.toFixed(0)}/100`, pct: Math.min(100, totalKmNum/100*100) };
    if (a.title === 'Sub-65 RHR') return { val: `${bestRHR}/65`, pct: Math.min(100, Math.max(0,(79-bestRHR)/(79-65)*100)) };
    if (a.title === '15k steps') return { val: `${bestSteps}/15000`, pct: Math.min(100, bestSteps/15000*100) };
    if (a.title === 'First 8h sleep') return { val: `best ${Math.max(...sleepVals).toFixed(1)}h`, pct: Math.min(100, Math.max(...sleepVals)/8*100) };
    return { val: '', pct: 0 };
  }
  const nextAchievements = lockedAchievements.slice(0, 3).map(a => ({ ...a, ...achProgress(a) }));

  // Milestone text
  const minWeight = Math.min(...weight.filter(v => v !== null));
  const milestone = minWeight < 85
    ? `Sub-85kg achieved — ${minWeight.toFixed(2)} kg · -${weightLost} kg total · ${totalKms} km walked`
    : `Current best: ${minWeight.toFixed(2)} kg · -${weightLost} kg total · ${totalKms} km walked`;

  // ── Retro mode render ──
  if (retroMode) {
    const hpFilled = Math.round(goalProgress / 5);
    const stairCount = 15;
    const stepDrop = Math.max(...weight) - Math.min(...weight);
    const stairsHtml = Array.from({length: stairCount}).map((_, i) => {
      const y = 10 + Math.round((i / (stairCount - 1)) * 56);
      return `<rect x="${i*20}" y="${y}" width="20" height="8" fill="#4ecdc4"/>`;
    }).join('');
    const lastStairY = 10 + 56;

    document.getElementById('app').innerHTML = `
      <div class="retro-wrap retro-scanline">
        <div class="retro-hud">
          <div class="retro-hud-box">
            <div class="retro-hud-label retro-px">Player</div>
            <div class="retro-hud-val retro-px">HEALTH_QUEST</div>
          </div>
          <div class="retro-hud-box">
            <div class="retro-hud-label retro-px">Day</div>
            <div class="retro-hud-val retro-px">${totalDays} / 30</div>
          </div>
          <div class="retro-hud-box">
            <div class="retro-hud-label retro-px">Score</div>
            <div class="retro-hud-val retro-px" style="color:#ffd93d;">${Math.round(totalKmNum * 10 + unlockedCount * 100)}</div>
          </div>
        </div>

        <div class="retro-hp-wrap">
          <div class="retro-hp-label retro-px">WEIGHT HP &nbsp;${lastWeight.toFixed(2)} / ${GOAL_WEIGHT.toFixed(2)} GOAL</div>
          <div class="retro-hp-track">
            ${Array.from({length:20}).map((_,i)=>`<div class="retro-hp-seg" style="background:${i < Math.round(goalProgress/5) ? '#ff6b6b' : '#2a1a1a'};"></div>`).join('')}
          </div>
        </div>

        <div class="retro-level-wrap">
          <div class="retro-level-label retro-px"><span>XP — STREAK LV.${streakKcal}</span><span class="retro-blink">▮</span></div>
          <div class="retro-level-track"><div class="retro-level-fill" style="width:${Math.min(100, streakKcal * 5)}%;"></div></div>
        </div>

        <div class="retro-panel">
          <div class="retro-panel-title retro-px">ACHIEVEMENT ITEMS — ${unlockedCount}/${achievements.length} COLLECTED</div>
          <div class="retro-sprite-row">
            ${achievements.map(a => `<div class="retro-sprite ${a.unlocked ? 'unlocked' : 'locked'}">${a.unlocked ? '★' : '?'}</div>`).join('')}
          </div>
        </div>

        <div class="retro-chart">
          <div class="retro-chart-title retro-px">WEIGHT TREND — DUNGEON DEPTH MAP</div>
          <svg width="100%" height="90" viewBox="0 0 300 90" role="img" aria-label="Pixel art staircase descending to represent weight loss progress">
          <title>Pixel staircase chart of weight progress</title>
          <rect x="0" y="0" width="300" height="90" fill="#0f0f1e"/>
          <g>${stairsHtml}</g>
          <rect x="${(stairCount-1)*20}" y="${lastStairY-8}" width="10" height="8" fill="#ffd93d"/>
          </svg>
        </div>

        <button class="retro-exit retro-px" onclick="exitRetroMode()">[ PRESS TO EXIT RETRO MODE ]</button>
      </div>
    `;
    return;
  }

  // Build HTML
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <div class="week">${startDate} – ${endDate} · ${totalDays} days</div>
        <h1>Personal Health Dashboard <span class="badge badge-g">Live</span></h1>
        <div class="sub">Self-tracked via Apple Watch Ultra · custom Excel tracker · auto-updated from CSV</div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="heart-trigger" id="heartTrigger" onclick="handleHeartClick()" aria-hidden="true">♥</span>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light and dark mode">${document.documentElement.classList.contains('light') ? '☀' : '☾'}</button>
      </div>
    </div>

    <div class="milestone">
      <div class="mi">🎯</div>
      <div>
        <div class="mt">${milestone}</div>
        <div class="ms">30-day projection: ~${Math.round(parseFloat(totalKms) / totalDays * 30)} km total distance</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="ct">Progress to goal</div>
      <div class="cs">${firstWeight.toFixed(2)} kg → ${GOAL_WEIGHT.toFixed(2)} kg target</div>
      <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:4px;">
        <span style="font-size:24px; font-weight:700; color:#46d160;">${lastWeight.toFixed(2)} kg</span>
        <span style="font-size:13px; color:#46d160;">${goalProgress}% there</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${goalProgress}%;"></div></div>
      <div class="progress-labels">
        <span>${firstWeight.toFixed(2)} kg (start)</span>
        <span>${GOAL_WEIGHT.toFixed(2)} kg (goal)</span>
      </div>
      <div class="streak-grid">
        <div class="streak-box">
          <div class="streak-n gn">${streakKcal}</div>
          <div class="streak-l">800kcal streak</div>
        </div>
        <div class="streak-box">
          <div class="streak-n gn">${streakKm}</div>
          <div class="streak-l">10km streak</div>
        </div>
        <div class="streak-box">
          <div class="streak-n ${streakSleep >= 3 ? 'gn' : 'am'}">${streakSleep}</div>
          <div class="streak-l">7h+ sleep streak</div>
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi">
        <div class="n or">-${weightLost}<span style="font-size:13px;">kg</span></div>
        <div class="l">total lost</div>
        <div class="d gn">${firstWeight.toFixed(2)} → ${lastWeight.toFixed(2)}</div>
      </div>
      <div class="kpi">
        <div class="n bl">${totalKms}<span style="font-size:13px;">km</span></div>
        <div class="l">total walked</div>
        <div class="d gn">${(parseFloat(totalKms)/totalDays).toFixed(1)} km/day avg</div>
      </div>
      <div class="kpi">
        <div class="n gn">${firstRHR}→${lastRHR}</div>
        <div class="l">RHR (bpm)</div>
        <div class="d gn">-${Math.round((firstRHR-lastRHR)/firstRHR*100)}% in ${totalDays} days</div>
      </div>
      <div class="kpi">
        <div class="n ${avgSleep >= 7 ? 'gn' : avgSleep >= 6 ? 'am' : 'rd'}">${toHM(avgSleep)}</div>
        <div class="l">avg sleep</div>
        <div class="d ${sleep7Days > 0 ? 'am' : 'rd'}">${sleep7Days}/${totalDays} nights ≥7h</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="ct">Weight · 7-day rolling average · daily steps</div>
      <div class="cs">7DRA smooths daily noise — the true trend is visible. Steps consistently above 10km daily target.</div>
      <div style="position:relative; height:230px;"><canvas id="ch1"></canvas></div>
      <div class="legend">
        <div class="leg"><div class="ls" style="background:var(--weight-line);"></div>Weight (kg)</div>
        <div class="leg"><div class="ls" style="border-top:2px dashed var(--avg-line); background:none;"></div>7-day rolling avg</div>
        <div class="leg"><div class="ls" style="border-top:2px dashed var(--steps-line); background:none;"></div>Daily steps</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="ct">Sleep · HRV · RHR triangle</div>
      <div class="cs">Sleep shown as previous night to correctly align cause and effect. Every poor sleep night produces a measurable next-morning response.</div>
      <div style="position:relative; height:230px;"><canvas id="ch2"></canvas></div>
      <div class="legend">
        <div class="leg"><div class="ls" style="background:#ff585b;"></div>RHR (bpm)</div>
        <div class="leg"><div class="ls" style="border-top:2px dashed #46d160; background:none;"></div>HRV</div>
        <div class="leg"><div class="ls" style="border-top:2px dotted #f5a623; background:none;"></div>Sleep prev. night (hrs)</div>
      </div>
      <div class="annotation">Sleep offset by one day — previous night's sleep shown against next morning's HRV and RHR. Pattern is consistent: poor sleep → HRV stress spike + RHR rebound within 24 hours.</div>
    </div>

    <div class="chart-card">
      <div class="ct">Daily target compliance</div>
      <div class="cs">800 kcal burn · 10km walk · no sugar · sleep 7h+ — green = achieved · amber = partial · red = missed</div>
      <div style="position:relative; height:120px;"><canvas id="ch3"></canvas></div>
      <div class="legend" style="margin-top:10px;">
        <div class="leg"><span style="width:10px;height:10px;border-radius:2px;background:#46d160;display:inline-block;"></span>Achieved</div>
        <div class="leg"><span style="width:10px;height:10px;border-radius:2px;background:#f5a623;display:inline-block;"></span>Partial</div>
        <div class="leg"><span style="width:10px;height:10px;border-radius:2px;background:#ff585b;display:inline-block;"></span>Missed</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="ct">Achievements</div>
      <div class="cs">${unlockedCount} unlocked · ${lockedAchievements.length} in progress</div>
      <div class="ach-grid">
        ${achievements.map(a => `
        <div class="ach ${a.unlocked ? 'unlocked' : 'locked'}">
          <i class="ti ${a.icon} ach-icon"></i>
          <div class="ach-title">${a.title}</div>
          <div class="ach-desc">${a.desc}</div>
        </div>`).join('')}
      </div>
      ${nextAchievements.length ? `
      <div style="margin-top:16px; border-top:1px solid #2d2d2e; padding-top:14px;">
        <div class="cs" style="margin-bottom:10px;">Next milestones</div>
        ${nextAchievements.map(a => `
        <div class="prog-row">
          <span class="prog-label">${a.title}</span>
          <div class="prog-track"><div class="prog-fill" style="width:${a.pct}%;"></div></div>
          <span class="prog-val">${a.val}</span>
        </div>`).join('')}
      </div>` : ''}
    </div>

    <div class="four-col">
      <div class="insight">
        <div class="it">distance</div>
        <div class="in bl">${totalKms}km</div>
        <div class="ib">${Math.round(parseFloat(totalKms)/totalDays*30)}km projected at 30 days.</div>
      </div>
      <div class="insight">
        <div class="it">best RHR</div>
        <div class="in gn">${bestRHR} bpm</div>
        <div class="ib">Personal best. Down from ${firstRHR} on day 1.</div>
      </div>
      <div class="insight">
        <div class="it">best HRV</div>
        <div class="in gn">${bestHRV}</div>
        <div class="ib">Highest recovery reading in dataset.</div>
      </div>
      <div class="insight">
        <div class="it">best day</div>
        <div class="in or">${bestSteps.toLocaleString()}</div>
        <div class="ib">Steps. Personal best single day.</div>
      </div>
    </div>

    <div class="footer">
      <div class="fl">Data: personal · Tools: Apple Watch Ultra, Excel · ${startDate} – ${endDate}</div>
      <div class="fr">Next milestone: ${minWeight < 85 ? 'sustain 7h+ sleep · target ' + (Math.floor(minWeight) - 1) + '.0 kg' : 'break 85 kg'}</div>
    </div>
  `;

  // ── Chart 1: Weight + 7DRA + Steps ──
  const weightLineColor = cssVar('--weight-line');
  const avgLineColor = cssVar('--avg-line');
  const stepsLineColor = cssVar('--steps-line');
  const pointHighlight = document.documentElement.classList.contains('light') ? '#1c1c1e' : '#ffffff';
  new Chart(document.getElementById('ch1'), {
    type: 'line',
    data: {
      labels: days,
      datasets: [
        { label: 'Weight (kg)', data: weight, borderColor: weightLineColor, backgroundColor: 'transparent', borderWidth: 2.5, pointRadius: 3, pointBackgroundColor: weightLineColor, yAxisID: 'y1', tension: 0.3, spanGaps: true },
        { label: '7-day avg', data: w7dra, borderColor: avgLineColor, backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [5,3], pointRadius: 2, yAxisID: 'y1', tension: 0.4, spanGaps: true },
        { label: 'Steps', data: steps, borderColor: stepsLineColor, backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,3], pointRadius: 3, pointStyle: 'rectRot', pointBackgroundColor: steps.map(s => s === bestSteps ? pointHighlight : stepsLineColor), yAxisID: 'y2', tension: 0.3, spanGaps: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        x: { ticks: { font: { size: 10 }, color: tick, maxRotation: 45 }, grid: { color: grid } },
        y1: { type: 'linear', position: 'left', ticks: { font: { size: 10 }, color: weightLineColor, callback: v => v.toFixed(1) }, grid: { color: grid } },
        y2: { type: 'linear', position: 'right', ticks: { font: { size: 10 }, color: stepsLineColor, callback: v => Math.round(v/1000)+'k' }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // ── Chart 2: Sleep · HRV · RHR ──
  const rhrLineColor = cssVar('--rhr-line');
  const hrvLineColor = cssVar('--hrv-line');
  const sleepLineColor = cssVar('--sleep-line');
  new Chart(document.getElementById('ch2'), {
    type: 'line',
    data: {
      labels: days,
      datasets: [
        { label: 'RHR (bpm)', data: rhr, borderColor: rhrLineColor, backgroundColor: 'transparent', borderWidth: 2, pointRadius: 3, pointBackgroundColor: rhr.map(v => v === bestRHR ? pointHighlight : rhrLineColor), yAxisID: 'y1', tension: 0.3, spanGaps: true },
        { label: 'HRV', data: hrv, borderColor: hrvLineColor, backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [5,3], pointRadius: 3, pointStyle: 'triangle', pointBackgroundColor: hrv.map(v => v === bestHRV ? pointHighlight : hrvLineColor), yAxisID: 'y1', tension: 0.3, spanGaps: true },
        { label: 'Sleep prev. night', data: sleep, borderColor: sleepLineColor, backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [2,2], pointRadius: 3, pointBackgroundColor: sleep.map(v => v >= 7 ? pointHighlight : sleepLineColor), yAxisID: 'y2', tension: 0.3, spanGaps: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label === 'Sleep prev. night') return ctx.parsed.y == null ? 'Sleep (prev): —' : 'Sleep (prev): ' + toHM(ctx.parsed.y);
              return ctx.dataset.label + ': ' + Math.round(ctx.parsed.y);
            }
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, color: tick, maxRotation: 45 }, grid: { color: grid } },
        y1: { type: 'linear', position: 'left', ticks: { font: { size: 10 }, color: tick }, grid: { color: grid } },
        y2: { type: 'linear', position: 'right', min: 0, max: 11, ticks: { font: { size: 10 }, color: sleepLineColor, callback: v => v.toFixed(0)+'h' }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // ── Chart 3: Compliance ──
  const compliance = [
    { label: '800 kcal', scores: comp800 },
    { label: '10 km',    scores: comp10km },
    { label: 'No sugar', scores: compSugar },
    { label: 'Sleep 7h', scores: compSleep }
  ];

  new Chart(document.getElementById('ch3'), {
    type: 'bar',
    data: {
      labels: days,
      datasets: compliance.map(t => ({
        label: t.label,
        data: t.scores.map(() => 1),
        backgroundColor: t.scores.map(s => colorMap[s] + 'aa'),
        borderColor: t.scores.map(s => colorMap[s]),
        borderWidth: 1,
        borderRadius: 2,
        stack: 'stack'
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const t = compliance[ctx.datasetIndex];
              const s = t.scores[ctx.dataIndex];
              return t.label + ': ' + (s===2 ? 'achieved' : s===1 ? 'partial' : 'missed');
            }
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { font: { size: 10 }, color: tick, maxRotation: 45 }, grid: { display: false } },
        y: { stacked: true, display: false, max: 4 }
      }
    }
  });
}

// ── Load CSV ──
Papa.parse(CSV_FILE, {
  download: true,
  skipEmptyLines: false,
  complete: function(results) {
    const rows = results.data.slice(HEADER_ROWS);
    buildDashboard(rows);
  },
  error: function(err) {
    document.getElementById('app').innerHTML = `<div class="loading">Could not load CSV file.<br><small style="color:#ff585b">${err.message}</small><br><br><small style="color:#545454">Make sure Health_Tracker.csv is in the same folder as this HTML file.</small></div>`;
  }
});
</script>
</body>
</html>
